<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Categorías')}"></head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<section class="categories" id="categorias">
    <div class="section-header">
        <div>
            <span class="label">Explora</span>
            <h2 class="section-title">CATEGORÍAS</h2>
        </div>
    </div>

    <div class="cat-grid">
        <a th:each="categoria : ${categorias}"
           th:href="@{/categorias/{id}(id=${categoria.id})}"
           class="cat-card">

            <img th:if="${categoria.imagen != null and categoria.imagen != ''}"
                 th:src="@{/imagenes/categorias/{imagenCat}(imagen=${categoria.imagen})}"
                 th:alt="${categoria.nombre}" />

            <img th:if="${categoria.imagen == null or categoria.imagen == ''}"
                 th:src="@{/imagenes/categorias/no-image.png}"
                 alt="Sin imagen" />

            <div class="cat-name" th:text="${categoria.nombre}">Nombre</div>
            <span class="cat-arrow">↗</span>
        </a>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
